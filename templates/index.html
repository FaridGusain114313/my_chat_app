<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Chat</title>
    <style>
        /* CSS əvvəlki kimi */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            background: #111111;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a0a0a;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
        }
        .header {
            padding: 16px 20px;
            background: #1a0505;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #8b0000;
        }
        .header .title {
            font-size: 18px;
            font-weight: 600;
            color: #cc0000;
        }
        .header .title span {
            color: #fff;
        }
        .header .status {
            font-size: 12px;
            color: #48bb78;
        }
        .header .status.offline {
            color: #cc0000;
        }
        .rooms {
            padding: 10px 20px;
            background: #0d0d0d;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1a0505;
        }
        .rooms button {
            padding: 6px 16px;
            border: 1px solid #2a0a0a;
            border-radius: 20px;
            background: transparent;
            color: #888888;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .rooms button:hover {
            background: #1a0505;
            color: #cc0000;
            border-color: #8b0000;
        }
        .rooms button.active {
            background: #8b0000;
            color: #fff;
            border-color: #cc0000;
        }
        .rooms .new-room {
            display: flex;
            gap: 6px;
        }
        .rooms .new-room input {
            padding: 4px 12px;
            border: 1px solid #2a0a0a;
            border-radius: 20px;
            background: #0a0a0a;
            color: #fff;
            outline: none;
            width: 120px;
            font-size: 13px;
        }
        .rooms .new-room input:focus {
            border-color: #8b0000;
        }
        .rooms .new-room button {
            background: #8b0000;
            color: #fff;
            padding: 4px 12px;
            border-color: #8b0000;
        }
        .rooms .new-room button:hover {
            background: #cc0000;
            border-color: #cc0000;
        }
        .messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            background: #0a0a0a;
        }
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #8b0000;
            border-radius: 3px;
        }
        .msg {
            margin-bottom: 10px;
            padding: 10px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.own {
            background: #660000;
            color: #fff;
            margin-left: auto;
            border: 1px solid #8b0000;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #2a0a0a;
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            background: transparent;
            color: #666666;
            text-align: center;
            max-width: 100%;
            font-size: 13px;
            font-style: italic;
            padding: 5px 0;
            border: none;
        }
        .msg .name {
            font-weight: 600;
            font-size: 13px;
            display: block;
            color: #cc0000;
            margin-bottom: 3px;
        }
        .msg.own .name {
            color: #ff6666;
        }
        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            display: block;
            text-align: right;
            margin-top: 4px;
        }
        .input-area {
            padding: 12px 20px;
            background: #0d0d0d;
            display: flex;
            gap: 10px;
            border-top: 2px solid #1a0505;
        }
        .input-area input {
            flex: 1;
            padding: 10px 18px;
            border: 1px solid #2a0a0a;
            border-radius: 25px;
            background: #0a0a0a;
            color: #fff;
            outline: none;
        }
        .input-area input:focus {
            border-color: #8b0000;
        }
        .input-area input::placeholder {
            color: #444444;
        }
        .input-area button {
            padding: 10px 28px;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .input-area button:hover {
            background: #cc0000;
            transform: scale(1.02);
        }
        .login {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .login-box {
            background: #111111;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            border: 1px solid #2a0a0a;
            box-shadow: 0 0 60px rgba(139, 0, 0, 0.2);
        }
        .login-box h2 {
            color: #cc0000;
            margin-bottom: 6px;
            font-size: 28px;
        }
        .login-box h2 span {
            color: #fff;
        }
        .login-box p {
            color: #888888;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #2a0a0a;
            border-radius: 12px;
            background: #0a0a0a;
            color: #fff;
            outline: none;
            margin-bottom: 10px;
        }
        .login-box input:focus {
            border-color: #8b0000;
        }
        .login-box input::placeholder {
            color: #444444;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover {
            background: #cc0000;
        }
        .login-box .error {
            color: #cc0000;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Giriş -->
    <div class="login" id="loginScreen">
        <div class="login-box">
            <h2>🔴 <span>Chat</span></h2>
            <p>İstifadəçi adınızı daxil edin</p>
            <input type="text" id="usernameInput" placeholder="Adınız..." />
            <button onclick="login()">Daxil ol</button>
            <p class="error" id="loginError">Ad daxil edin!</p>
        </div>
    </div>

    <!-- Chat -->
    <div class="container" id="app">
        <div class="header">
            <span class="title">🔴 <span id="roomTitle">Chat</span></span>
            <span class="status" id="status">🟢 Bağlı</span>
        </div>
        <div class="rooms" id="roomsBar">
            <button class="active" data-room="ümumi" onclick="joinRoom('ümumi')">🏠 Ümumi</button>
            <div class="new-room">
                <input type="text" id="newRoomInput" placeholder="Yeni otaq..." />
                <button onclick="createRoom()">➕</button>
            </div>
        </div>
        <div class="messages" id="messages">
            <div style="text-align:center;color:#444444;padding:20px;">💬 Mesaj yazın</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Mesaj..." />
            <button onclick="sendMessage()">Göndər</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js">
    </script>
    <script>
        let socket = null;
        let username = '';
        let currentRoom = 'ümumi';
        let roomsData = {};
        let lastAddedMessage = '';

        // ===== GİRİŞ =====
        function login() {
            const input = document.getElementById('usernameInput');
            const error = document.getElementById('loginError');
            const name = input.value.trim();
            if (!name) { error.style.display = 'block'; return; }
            error.style.display = 'none';
            username = name;
            document.getElementById('loginScreen').classList.add('hidden');
            connectSocket();
        }

        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // ===== SOCKET =====
        function connectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }

            socket = io({
                transports: ['websocket', 'polling'],
                secure: true
            });

            socket.once('connect', function() {
                console.log('✅ Bağlandı');
                document.getElementById('status').textContent = '🟢 Bağlı';
                document.getElementById('status').className = 'status';
                setTimeout(() => joinRoom('ümumi'), 300);
            });

            socket.once('connect_error', function() {
                document.getElementById('status').textContent = '🔴 Bağlantı yoxdur';
                document.getElementById('status').className = 'status offline';
            });

            socket.on('disconnect', function() {
                document.getElementById('status').textContent = '🔴 Bağlantı yoxdur';
                document.getElementById('status').className = 'status offline';
            });

            socket.off('rooms_list').on('rooms_list', function(rooms) {
                roomsData = {};
                rooms.forEach(function(r) { roomsData[r.id] = r.name; });
                renderRooms(rooms);
            });

            socket.off('history').on('history', function(data) {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(function(msg) { addMessage(msg); });
                } else {
                    container.innerHTML =
                        '<div style="text-align:center;color:#444444;padding:20px;">💬 Hələ mesaj yoxdur</div>';
                }
            });

            socket.off('message').on('message', function(data) {
                console.log('📩 Mesaj gəldi (frontend):', data);
                lastAddedMessage = '';
                addMessage(data);
            });

            socket.off('user_count').on('user_count', function(data) {
                const btns = document.querySelectorAll('.rooms button[data-room]');
                btns.forEach(function(btn) {
                    if (btn.dataset.room === data.room) {
                        const count = data.count > 0 ? ' (' + data.count + ')' : '';
                        btn.textContent = btn.textContent.replace(/ \(\d+\)/, '') + count;
                    }
                });
            });
        }

        // ===== OTAQLAR =====
        function joinRoom(room) {
            if (!socket || !socket.connected) return;
            currentRoom = room;

            const roomTitle = document.getElementById('roomTitle');
            if (roomTitle) {
                roomTitle.textContent = roomsData[room] || room;
            }

            socket.emit('join', { room: room, username: username });

            document.querySelectorAll('.rooms button[data-room]').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.room === room);
            });
        }

        function createRoom() {
            const input = document.getElementById('newRoomInput');
            const name = input.value.trim();
            if (!name) return;

            fetch('/api/rooms/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) { alert(data.error); return; }
                    roomsData[data.id] = data.name;
                    input.value = '';
                    renderRooms(Object.keys(roomsData).map(function(id) { return { id: id, name: roomsData[id] }; }));
                    setTimeout(function() { joinRoom(data.id); }, 300);
                })
                .catch(function(err) { alert('Xəta: ' + err.message); });
        }

        function renderRooms(rooms) {
            const bar = document.getElementById('roomsBar');
            const newRoomDiv = bar.querySelector('.new-room');
            bar.innerHTML = '';
            rooms.forEach(function(room) {
                const btn = document.createElement('button');
                btn.dataset.room = room.id;
                btn.textContent = room.name;
                btn.onclick = function() { joinRoom(room.id); };
                if (room.id === currentRoom) btn.classList.add('active');
                bar.appendChild(btn);
            });
            bar.appendChild(newRoomDiv);
        }

        // ===== MESAJLAR =====
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg || !socket || !socket.connected) return;

            const now = new Date();
            const time = now.toLocaleTimeString('az');
            const data = {
                room: currentRoom,
                username: username,
                message: msg,
                time: time
            };

            console.log('📤 Mesaj göndərilir:', data);
            socket.emit('message', data);

            // Öz mesajını dərhal əlavə et
            addMessage({
                username: username,
                message: msg,
                time: time,
                type: 'user'
            });

            input.value = '';
            input.focus();
        }

        function addMessage(data) {
            console.log('📩 addMessage çağırıldı:', data);

            // **DƏYİŞİKLİK:** Elementi hər dəfə yenidən tap
            let container = document.getElementById('messages');
            
            // Element yoxdursa, yarat
            if (!container) {
                console.warn('⚠️ messages elementi tapılmadı, yaradılır...');
                container = document.createElement('div');
                container.id = 'messages';
                container.className = 'messages';
                
                const chatArea = document.querySelector('.container');
                if (chatArea) {
                    const inputArea = document.querySelector('.input-area');
                    if (inputArea) {
                        chatArea.insertBefore(container, inputArea);
                    } else {
                        chatArea.appendChild(container);
                    }
                } else {
                    document.body.appendChild(container);
                }
                console.log('✅ messages elementi yaradıldı');
            }

            // System mesajları üçün təkrarlanma yoxlaması
            if (data.type === 'system') {
                const lastMessages = container.querySelectorAll('.msg.system');
                for (let i = lastMessages.length - 1; i >= 0 && i >= lastMessages.length - 3; i--) {
                    if (lastMessages[i] && lastMessages[i].textContent === data.message) {
                        console.log('⚠️ Təkrarlanan system mesajı bloklandı:', data.message);
                        return;
                    }
                }
            }

            const messageKey = data.username + '-' + data.message + '-' + data.time;
            if (messageKey === lastAddedMessage) {
                console.log('⚠️ Təkrarlanan mesaj bloklandı (frontend)');
                return;
            }
            lastAddedMessage = messageKey;

            const div = document.createElement('div');
            div.className = 'msg';

            if (data.type === 'system') {
                div.className = 'msg system';
                div.textContent = data.message;
            } else if (data.username === username) {
                div.className = 'msg own';
                div.innerHTML = `
                    <span class="name">${data.username}</span>
                    ${data.message}
                    <span class="time">${data.time || ''}</span>
                `;
            } else {
                div.className = 'msg other';
                div.innerHTML = `
                    <span class="name">${data.username}</span>
                    ${data.message}
                    <span class="time">${data.time || ''}</span>
                `;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ===== HADİSƏLƏR =====
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('newRoomInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') createRoom();
        });
    </script>

</body>
</html>
