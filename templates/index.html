<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Chat App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2d3748;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .chat-header small {
            font-weight: normal;
            font-size: 12px;
            opacity: 0.7;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f7fafc;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.own {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .message .username {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
            display: block;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
        .message.own .time { color: #cbd5e0; }
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }
        .chat-input input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .chat-input input[type="text"]:focus {
            border-color: #667eea;
        }
        .chat-input button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-input button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        .username-input {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #edf2f7;
            border-bottom: 1px solid #e2e8f0;
        }
        .username-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            font-size: 13px;
        }
        .username-input button {
            padding: 8px 20px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            💬 Chat App
            <small>• Socket.IO ilə real-time</small>
        </div>
        
        <div class="username-input" id="usernameSection">
            <input type="text" id="usernameInput" placeholder="👤 İstifadəçi adınız..." />
            <button onclick="setUsername()">Daxil ol</button>
        </div>
        
        <div class="chat-messages" id="messageContainer">
            <div style="text-align:center;color:#a0aec0;padding:20px;">
                💡 Daxil olub söhbətə başlayın
            </div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." />
            <button onclick="sendMessage()">Göndər</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        let username = '';
        let messageCount = 0;

        // İstifadəçi adını təyin et
        function setUsername() {
            const input = document.getElementById('usernameInput');
            const name = input.value.trim();
            if (name) {
                username = name;
                document.getElementById('usernameSection').style.display = 'none';
                document.getElementById('messageInput').focus();
                // Xoş gəldin mesajı
                addMessage('system', `👋 ${username} söhbətə qoşuldu!`);
            }
        }

        // Enter ilə daxil ol
        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') setUsername();
        });

        // Enter ilə mesaj göndər
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Mesaj göndər
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!username) {
                alert('Zəhmət olmasa əvvəlcə istifadəçi adınızı daxil edin!');
                return;
            }
            
            if (message) {
                const now = new Date();
                const time = now.toLocaleTimeString('az');
                
                const data = {
                    username: username,
                    message: message,
                    time: time
                };
                
                socket.emit('message', data);
                input.value = '';
                input.focus();
            }
        }

        // Mesaj əlavə et
        function addMessage(type, data) {
            const container = document.getElementById('messageContainer');
            
            // Sistem mesajı (system)
            if (type === 'system') {
                const div = document.createElement('div');
                div.style.textAlign = 'center';
                div.style.color = '#a0aec0';
                div.style.padding = '5px';
                div.style.fontSize = '13px';
                div.innerHTML = data;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
                return;
            }
            
            // İstifadəçi mesajı
            const div = document.createElement('div');
            div.className = 'message';
            
            if (data.username === username) {
                div.classList.add('own');
            } else {
                div.classList.add('other');
            }
            
            div.innerHTML = `
                <span class="username">${data.username}</span>
                ${data.message}
                <span class="time">${data.time}</span>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Socket.IO eventləri
        socket.on('connect', function() {
            console.log('✅ Serverə qoşuldu!');
        });

        socket.on('message', function(data) {
            addMessage('user', data);
        });

        socket.on('history', function(data) {
            addMessage('user', data);
        });

        socket.on('disconnect', function() {
            console.log('❌ Serverdən ayrıldı!');
        });
    </script>
</body>
</html>
